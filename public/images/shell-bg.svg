<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.2"></path>
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="#020617"></rect>
  <rect width="100%" height="100%" fill="url(#grid)"></rect>
  <rect width="100%" height="100%" fill="url(#glow)"></rect>
</svg>