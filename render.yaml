# Render Blueprint — one file, whole stack.
# Replaces the local devlogger-server.yml (Postgres + pgAdmin) for production:
#   - postgres  -> managed Render Postgres (free plan)
#   - pgadmin   -> dropped (use local pgAdmin pointed at the remote DB)
# Deploy: commit this to the repo root, then New + > Blueprint in the Render dashboard.

services:
  - type: web
    name: devlogger
    runtime: node
    plan: free
    region: oregon            # pick the region nearest you
    branch: main              # adjust if you deploy from a different branch
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /login    # public route; the app redirects unauthenticated users here
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devlogger-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true    # Render mints a fresh secret — your leaked local one stays dead
      - key: NODE_VERSION
        value: "20"

databases:
  - name: devlogger-db
    plan: free
    databaseName: devlogger
    user: devlogger
